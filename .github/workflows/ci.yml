name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-infra:
    name: Validate infrastructure files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint

      - name: Lint shell scripts
        run: |
          echo "Running shellcheck..."
          shellcheck scripts/*.sh

      - name: Validate docker compose
        run: |
          echo "Checking docker compose syntax..."
          docker compose -f docker/docker-compose.yml config

      - name: Lint YAML files
        run: |
          echo "Linting YAML in docker and config directories..."
          yamllint docker/**/*.yml config/**/*.yml || true

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3
        with:
          dockerfile: docker/services/odoo/Dockerfile

      - name: Test Nginx configuration
        run: |
          echo "Testing nginx configuration files under config/nginx..."
          sudo apt-get install -y nginx
          if [ -f "$GITHUB_WORKSPACE/config/nginx/nginx.conf" ]; then
            nginx -t -c "$GITHUB_WORKSPACE/config/nginx/nginx.conf"
          else
            echo "No config/nginx/nginx.conf found, skipping nginx -t"
          fi
